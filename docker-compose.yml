services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://webhooks.dtcmvp.com/api}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://offers.dtcmvp.com}
    container_name: dtcmvp-offers-frontend
    environment:
      # Server-side only — consumed by the /api/auth/* Next.js route handler
      # that proxies browser auth requests. Browser never sees this.
      AUTH_API_URL: ${AUTH_API_URL:-https://api.dtcmvpete.com}
      # /scrape-results reads from a read-only scrape DB mounted via volumes.
      SCRAPE_DB_PATH: /app/data/1800dtc.db
      # SWAG specs are stored in a writable SQLite DB (separate from 1800dtc).
      SWAG_DB_PATH: /app/swag-data/swags.db
    ports:
      # Bind to localhost only — nginx handles external TLS on 443
      - "127.0.0.1:3005:3000"
    volumes:
      # Bind-mount the host's data dir containing 1800dtc.db. The file is
      # scp'd to the droplet out-of-band (see deploy/README-DEPLOY.md) — too
      # large for git. Read-only is enough; nothing here is a write target.
      - ./data:/app/data:ro
      # SWAG specs DB — writable so agents can insert/update specs without rebuild.
      - ./swag-data:/app/swag-data
    restart: unless-stopped
    healthcheck:
      # 127.0.0.1 (not localhost) — avoids alpine wget resolving to IPv6
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
