services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://webhooks.dtcmvp.com/api}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://offers.dtcmvp.com}
        NEXT_PUBLIC_AUTH_API_URL: ${NEXT_PUBLIC_AUTH_API_URL:-https://api.dtcmvpete.com}
    container_name: dtcmvp-offers-frontend
    ports:
      # Bind to localhost only — nginx handles external TLS on 443
      - "127.0.0.1:3005:3000"
    restart: unless-stopped
    healthcheck:
      # 127.0.0.1 (not localhost) — avoids alpine wget resolving to IPv6
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
